<svg width="380" height="249" viewBox="0 0 380 249" xmlns="http://www.w3.org/2000/svg">

<rect x="2" y="2" width="376" height="245" rx="8"
fill="#1E1E2E"
stroke="#585B70"
stroke-width="4"/>

<style>
.title {
  fill: #CDD6F4;
  font-size: 18px;
  font-family: Verdana, sans-serif;
  font-weight: bold;
}

.subtitle {
  fill: #CBA6F7;
  font-size: 11px;
  font-family: Verdana, sans-serif;
  font-weight: 600;
}

.label {
  fill: #CDD6F4;
  font-size: 10px;
  font-family: Verdana, sans-serif;
  font-weight: 600;
}

.rotate {
  animation: spin 12s linear infinite;
  transform-origin: 70px 70px;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}
</style>

<!-- Title -->
<text x="190" y="35" text-anchor="middle" class="title">
Most Used Technologies
</text>

