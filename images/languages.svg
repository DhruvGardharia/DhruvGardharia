<!-- Subtitle -->
<text x="20" y="65" class="subtitle">
Technology Distribution Across Projects
</text>

<!-- PIE CHART -->
<g transform="translate(220,65)">
<g class="rotate">

<!-- JavaScript 60% -->
<path d="M70,70 L70,0 A70,70 0 1,1 28.9,126.6 Z"
fill="#f1e05a"/>

<!-- Python 15% -->
<path d="M70,70 L28.9,126.6 A70,70 0 0,1 3.4,48.4 Z"
fill="#3572A5"/>

<!-- HTML 10% -->
<path d="M70,70 L3.4,48.4 A70,70 0 0,1 28.9,13.4 Z"
fill="#e34c26"/>

<!-- C++ 10% -->
<path d="M70,70 L28.9,13.4 A70,70 0 0,1 70,0 Z"
fill="#a855f7"/>

<!-- Other 5% -->
<path d="M70,70 L70,0 A70,70 0 0,1 70,0 Z"
fill="#9CA3AF"/>

<animateTransform
attributeName="transform"
attributeType="XML"
type="rotate"
from="0 70 70"
to="360 70 70"
dur="10s"
repeatCount="indefinite"/>

</g>

<!-- Donut Hole -->
<circle cx="70" cy="70" r="24" fill="#1E1E2E"/>

</g>

<!-- LEGEND -->
<g transform="translate(20,92)">

<rect width="14" height="14" rx="2" fill="#f1e05a"/>
<text x="24" y="11" class="label">JavaScript 60%</text>

<rect y="28" width="14" height="14" rx="2" fill="#3572A5"/>
<text x="24" y="39" class="label">Python 15%</text>

<rect y="56" width="14" height="14" rx="2" fill="#e34c26"/>
<text x="24" y="67" class="label">HTML 10%</text>

<rect y="84" width="14" height="14" rx="2" fill="#a855f7"/>
<text x="24" y="95" class="label">C++ 10%</text>

<rect y="112" width="14" height="14" rx="2" fill="#9CA3AF"/>
<text x="24" y="123" class="label">Other 5%</text>

</g>

</svg>
