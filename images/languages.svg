
<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">

<style>
text {
  font-family: Arial, sans-serif;
}

@keyframes rotateChart {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.chart {
  transform-origin: 350px 150px;
  animation: rotateChart 18s linear infinite;
}
</style>

<rect width="500" height="300" rx="18" fill="#1E1E2E" stroke="#585B70" stroke-width="4"/>

<text x="250" y="40" fill="#CDD6F4" font-size="28" font-weight="bold" text-anchor="middle">
Most Used Technologies
</text>

<!-- Legend -->

<rect x="35" y="80" width="18" height="18" fill="#F7DF1E"/>
<text x="65" y="95" fill="#CDD6F4" font-size="20">JavaScript 48%</text>

<rect x="35" y="115" width="18" height="18" fill="#3178C6"/>
<text x="65" y="130" fill="#CDD6F4" font-size="20">TypeScript 20%</text>

<rect x="35" y="150" width="18" height="18" fill="#3776AB"/>
<text x="65" y="165" fill="#CDD6F4" font-size="20">Python 12%</text>

<rect x="35" y="185" width="18" height="18" fill="#f89820"/>
<text x="65" y="200" fill="#CDD6F4" font-size="20">Java 10%</text>

<rect x="35" y="220" width="18" height="18" fill="#649ad2"/>
<text x="65" y="235" fill="#CDD6F4" font-size="20">C++ 5%</text>

<rect x="35" y="255" width="18" height="18" fill="#888888"/>
<text x="65" y="270" fill="#CDD6F4" font-size="20">Other 5%</text>

<!-- Pie Chart -->
<g class="chart">

<circle r="85" cx="350" cy="160" fill="#F7DF1E"
stroke="#3178C6"
stroke-width="170"
stroke-dasharray="534 1000"
stroke-dashoffset="0"
/>

<circle r="85" cx="350" cy="160" fill="transparent"
stroke="#3178C6"
stroke-width="170"
stroke-dasharray="224 1000"
stroke-dashoffset="-534"
/>

<circle r="85" cx="350" cy="160" fill="transparent"
stroke="#3776AB"
stroke-width="170"
stroke-dasharray="135 1000"
stroke-dashoffset="-758"
/>

<circle r="85" cx="350" cy="160" fill="transparent"
stroke="#f89820"
stroke-width="170"
stroke-dasharray="112 1000"
stroke-dashoffset="-893"
/>

</g>

<circle cx="350" cy="160" r="40" fill="#1E1E2E"/>

</svg>
